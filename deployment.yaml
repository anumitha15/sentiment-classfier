apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-text-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-text
  template:
    metadata:
      labels:
        app: ai-text
    spec:
      containers:
        - name: ai-text-container
          image: 596916983156.dkr.ecr.ap-south-1.amazonaws.com/ai-text-classifier:latest
          ports:
            - containerPort: 5001
      imagePullSecrets:
        - name: ecr-secret