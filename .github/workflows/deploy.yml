name: CI-CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-south-1

    - name: Login to ECR
      run: |
        aws ecr get-login-password --region ap-south-1 | \
        docker login --username AWS --password-stdin 596916983156.dkr.ecr.ap-south-1.amazonaws.com

    - name: Build Docker Image
      run: |
        docker build -t ai-text-classifier .

    - name: Tag Image
      run: |
        docker tag ai-text-classifier:latest 596916983156.dkr.ecr.ap-south-1.amazonaws.com/ai-text-classifier:latest

    - name: Push to ECR
      run: |
        docker push 596916983156.dkr.ecr.ap-south-1.amazonaws.com/ai-text-classifier:latest

    - name: Deploy to Kubernetes
      run: |
        kubectl apply -f deployment.yaml
